<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Sanitized DNS and HTTP validation screenshot</title>
  <desc id="desc">Terminal-style screenshot showing DNS resolution, HTTP response, and route validation checks passing.</desc>
  <rect width="960" height="540" fill="#0d1117"/>
  <rect x="48" y="44" width="864" height="452" rx="8" fill="#121826" stroke="rgba(232,237,242,0.16)"/>
  <rect x="48" y="44" width="864" height="44" rx="8" fill="#172033"/>
  <circle cx="76" cy="66" r="6" fill="#f7768e"/>
  <circle cx="98" cy="66" r="6" fill="#e0af68"/>
  <circle cx="120" cy="66" r="6" fill="#9ece6a"/>
  <text x="144" y="72" fill="#9aa7b4" font-family="Cascadia Code, Consolas, monospace" font-size="15">sanitized-dns-connectivity</text>
  <g font-family="Cascadia Code, Consolas, monospace" font-size="22">
    <text x="82" y="130" fill="#7aa2f7">$ getent hosts example.com</text>
    <text x="82" y="164" fill="#e8edf2">2606:4700:10::6814:179a example.com</text>
    <text x="82" y="218" fill="#7aa2f7">$ curl -I https://example.com</text>
    <text x="82" y="252" fill="#9ece6a">HTTP/2 200</text>
    <text x="82" y="306" fill="#7aa2f7">$ ip route | head -1</text>
    <text x="82" y="340" fill="#e8edf2">default via [sanitized-gateway] dev eth0</text>
    <text x="82" y="414" fill="#9aa7b4">public target used here to avoid exposing home-lab hostnames or IPs</text>
  </g>
</svg>
